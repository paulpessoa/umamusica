name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: gen-lang-client-0488099061
  GAR_LOCATION: us-east1
  GAR_REPO: umamusica
  SERVICE: umamusica
  REGION: us-east1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/app:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --set-env-vars=NODE_ENV=production
            --set-env-vars=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            --set-env-vars=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            --set-env-vars=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            --set-env-vars=SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            --set-env-vars=ML_TOKEN=${{ secrets.ML_TOKEN }}
            --set-env-vars=ML_P_KEY=${{ secrets.ML_P_KEY }}
            --set-env-vars=BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            --set-env-vars=BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
            --set-env-vars=APP_URL=${{ vars.APP_URL }}
            --set-env-vars=API_URL=${{ vars.API_URL }}
            --set-env-vars=FRONTEND_URL=${{ vars.FRONTEND_URL }}
            --set-env-vars=ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
            --set-env-vars=RATE_LIMIT_ENABLED=${{ secrets.RATE_LIMIT_ENABLED }}
            --set-env-vars=DAILY_AI_COST_LIMIT_BRL=${{ secrets.DAILY_AI_COST_LIMIT_BRL }}
            --set-env-vars=USD_TO_BRL=${{ secrets.USD_TO_BRL }}
            --set-env-vars=WHISPER_COST_PER_CALL_BRL=${{ secrets.WHISPER_COST_PER_CALL_BRL }}
            --set-env-vars=GROQ_INPUT_COST_USD=${{ secrets.GROQ_INPUT_COST_USD }}
            --set-env-vars=GROQ_OUTPUT_COST_USD=${{ secrets.GROQ_OUTPUT_COST_USD }}
            --set-env-vars=GEMINI_INPUT_COST_USD=${{ secrets.GEMINI_INPUT_COST_USD }}
            --set-env-vars=GEMINI_OUTPUT_COST_USD=${{ secrets.GEMINI_OUTPUT_COST_USD }}

      - name: Show Output
        run: |
          echo "## 🚀 Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Cloud Run URL: ${{ steps.deploy.outputs.url }}"
